<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">

    <style>
        :root {
            --pro-red: #ff003c; --pro-cyan: #00f7ff;
            --pro-gold: #ffcc00; --pro-purple: #9d00ff;
        }
        * { box-sizing: border-box; touch-action: none; margin: 0; padding: 0; }
        body { height: 100vh; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; z-index: 1; }
        #core { position: fixed; right: 20px; bottom: 120px; width: 230px; z-index: 99999; user-select: none; cursor: move; }
        #timerPill {
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            background: #000; color: #fff; border: 2px solid var(--pro-cyan);
            padding: 5px 22px; border-radius: 30px; font-weight: 900; font-size: 20px;
            box-shadow: 0 0 20px var(--pro-cyan); min-width: 100px; text-align: center;
        }
        #panel { display: none; }
        .stage { position: relative; height: 220px; width: 100%; display: flex; align-items: center; justify-content: center; }
        
        /* 4 FIREBALLS ANIMATION */
        .orbit-container {
            position: absolute; width: 200px; height: 200px;
            animation: rotateRGB 3s linear infinite;
        }
        @keyframes rotateRGB { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .fireball {
            position: absolute; width: 22px; height: 22px; border-radius: 50%;
            background: #fff; box-shadow: 0 0 20px currentColor, 0 0 40px currentColor;
            border: 2px solid #fff;
        }

        .content {
            position: relative; z-index: 10; text-align: center; background: rgba(0,0,0,0.85);
            border-radius: 20px; width: 125px; height: 125px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border: 2px solid var(--pro-cyan);
        }
        .bs { font-size: 38px; font-weight: 1000; margin: 5px 0; }
        .big { color: #00ff00; text-shadow: 0 0 25px #00ff00; }
        .small { color: #ff0000; text-shadow: 0 0 25px #ff0000; }

        #login { padding: 25px; border-radius: 20px; background: #000; border: 2px solid var(--pro-cyan); box-shadow: 0 0 30px var(--pro-cyan); text-align: center; }
        .inp { width: 100%; height: 45px; background: #111; border: 2px solid var(--pro-purple); border-radius: 10px; color: #fff; text-align: center; margin-bottom: 15px; }
        .btn { width: 100%; height: 45px; border: none; border-radius: 10px; background: linear-gradient(45deg, var(--pro-cyan), var(--pro-purple)); color: #fff; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<iframe src="https://www.hgnice16.com/#/register?invitationCode=647771871437"></iframe>

<div id="core">
    <div id="timerPill">--</div>
    <div id="login">
        <div style="color:var(--pro-cyan); font-size:12px; margin-bottom:10px;">SYSTEM ACTIVATION (hgnice)</div>
        <input id="keyField" class="inp" type="password" placeholder="ENTER PRO KEY">
        <button id="unlockBtn" class="btn">START HACK</button>
    </div>
    <div id="panel">
        <div class="stage">
            <div class="orbit-container">
                <div class="fireball" style="top: -11px; left: 50%; transform: translateX(-50%); color: var(--pro-red);"></div>
                <div class="fireball" style="bottom: -11px; left: 50%; transform: translateX(-50%); color: var(--pro-cyan);"></div>
                <div class="fireball" style="left: -11px; top: 50%; transform: translateY(-50%); color: #00ff00;"></div>
                <div class="fireball" style="right: -11px; top: 50%; transform: translateY(-50%); color: #ff00ff;"></div>
            </div>
            <div class="content">
                <div style="font-size:9px; color:var(--pro-gold);">SAZIM BOOM HACK</div>
                <div style="font-size:11px; color:#fff;">WINGO 30s</div>
                <div class="bs small" id="bs">WAIT</div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAwc6M9HFkbwhfcBSOXeCcNn-UCfCgkOfQ",
      authDomain: "riham-vip-proha.firebaseapp.com",
      databaseURL: "https://riham-vip-proha-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "riham-vip-proha",
      storageBucket: "riham-vip-proha.firebasestorage.app",
      messagingSenderId: "997994832153",
      appId: "1:997994832153:web:db4721c98994db9427a588"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    document.getElementById('unlockBtn').addEventListener('click', () => {
        const userKey = document.getElementById('keyField').value;
        db.ref('keys/' + userKey).once('value', (s) => {
            if(s.exists() && s.val().status === "active"){
                document.getElementById('login').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                startTimer();
            } else { alert("Invalid or Blocked Key!"); }
        });
    });

    function startTimer(){
        setInterval(() => {
            const d = new Date();
            const rem = 30 - (d.getSeconds() % 30);
            document.getElementById('timerPill').textContent = rem < 10 ? `0${rem}` : rem;
            if(rem <= 5) {
                document.getElementById('bs').textContent = "WAIT";
                document.getElementById('bs').className = "bs";
                document.getElementById('bs').style.color = "white";
            } else {
                const isBig = (Math.sin(Math.floor(d.getTime()/30000)*12345) > 0);
                document.getElementById('bs').textContent = isBig ? "BIG" : "SMALL";
                document.getElementById('bs').className = isBig ? "bs big" : "bs small";
            }
        }, 1000);
    }

    // Dragging
    let core = document.getElementById('core'), isD = false, sx, sy, il, it;
    core.addEventListener('touchstart', (e) => { 
        if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON'){
            isD = true; sx = e.touches[0].clientX; sy = e.touches[0].clientY;
            il = core.offsetLeft; it = core.offsetTop;
        }
    });
    core.addEventListener('touchmove', (e) => {
        if(!isD) return;
        core.style.left = (il + e.touches[0].clientX - sx) + 'px';
        core.style.top = (it + e.touches[0].clientY - sy) + 'px';
    });
    core.addEventListener('touchend', () => isD = false);
</script>
</body>
</html>
